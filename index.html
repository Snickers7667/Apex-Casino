<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex C. | Főoldal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <h1>Apex Casino</h1>
    </div>

    <div class="auth" id="authArea">
      <!-- Redirect to login page instead of inline login -->
       <button onclick="window.location.href='register.html'">
        <i class="fa fa-user-plus" aria-hidden="true"></i> Regisztráció
      </button>
      <button onclick="window.location.href='login.html'">
         <i class="fa fa-sign-in" aria-hidden="true"></i> Bejelentkezés
      </button>
      
      
    </div>
    
  </header>


  <!-- SIDEBAR (JÁTÉKOK) -->
  <aside class="sidebar">
    <h3>Játékaink</h3>

    <button onclick="openPopup('Rulett')">Rulett</button>
    <button onclick="openPopup('Póker')">Póker</button>
    <button onclick="openPopup('Blackjack')">Blackjack</button>
    <button onclick="openPopup('Slot Machine')">Slot Machine</button>
    <button onclick="openPopup('Dice Roll')">Dice Roll</button>
  </aside>


  <!-- MAIN CONTENT -->
  <main class="content">

    <section class="slideshow">
    <div class="slide active" style="background-image:url('https://media.geeksforgeeks.org/img-practice/banner/mern-full-stack-development-classroom-thumbnail.png?v=19625');"></div>
    <div class="slide" style="background-image:url('https://media.geeksforgeeks.org/img-practice/banner/dsa-to-development-coding-guide-thumbnail.png?v=19625');"></div>
    <div class="slide" style="background-image:url('https://media.geeksforgeeks.org/img-practice/banner/geeks-classes-live-thumbnail.png?v=19625');"></div>
    <div class="slide" style="background-image:url('https://media.geeksforgeeks.org/img-practice/banner/gate-crash-course-2024-thumbnail.png?v=19625');"></div>
  </section>

    <!-- Clean casino intro section -->
    <section class="hero">
      <h2>Üdvözlünk az Apex Casinóban</h2>
      <p>
        Tapasztald meg a prémium online szerencsejáték élményt biztonságos
        környezetben, gyors kifizetésekkel és izgalmas játékokkal.
      </p>
    </section>

  

  </main>

</div>


<!-- POPUP (Original logic kept) -->
<div id="popup" class="popup">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">&times;</span>
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
    <button id="popupButton">Indítás</button>
  </div>
</div>

<script src="https://kit.fontawesome.com/fea9247c39.js" crossorigin="anonymous"></script>
<script src="script.js"></script>

</body>
</html>
